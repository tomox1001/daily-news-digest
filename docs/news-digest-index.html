<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #f0f2f6;
  --border: #e2e5ed;
  --text: #1a1d2e;
  --text-muted: #5f6680;
  --accent-blue: #3b6de0;
  --accent-purple: #7c5cdb;
  --accent-green: #1aab55;
  --gradient-1: linear-gradient(135deg, #3b6de0 0%, #7c5cdb 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

/* Hero */
.hero {
  position: relative;
  overflow: hidden;
  padding: 60px 40px 50px;
  background: linear-gradient(160deg, #1e2a4a 0%, #253565 40%, #1e3a5f 70%, #1e2a4a 100%);
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(79,140,255,0.15) 0%, transparent 50%),
              radial-gradient(circle at 70% 30%, rgba(160,124,255,0.12) 0%, transparent 40%);
  animation: float 20s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -1%) rotate(1deg); }
  66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
}
.hero-content {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 100px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #b8d0ff;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
}
.hero-badge .pulse {
  width: 8px; height: 8px;
  background: var(--accent-green);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.hero h1 {
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.2;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, #a0b4d0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero .subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
}
.hero .stats-strip {
  display: flex;
  gap: 24px;
  margin-top: 32px;
  flex-wrap: wrap;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  backdrop-filter: blur(10px);
}
.stat-item .label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.stat-item .value {
  font-size: 18px;
  font-weight: 700;
  font-family: 'Inter', monospace;
  color: #fff;
}

/* Layout */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
}

/* Month Group */
.month-group {
  margin: 48px 0 32px;
}
.month-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.month-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  background: var(--gradient-1);
  color: #fff;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
}
.month-header h2 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.month-header .sub {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
}

/* Digest Entry */
.digest-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}
.digest-entry {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 32px;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: block;
}
.digest-entry:hover {
  transform: translateY(-3px);
  border-color: rgba(59,109,224,0.35);
  box-shadow: 0 8px 32px rgba(30,42,74,0.1);
}
.digest-entry .accent {
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  border-radius: 20px 0 0 20px;
}
.digest-entry .day-number {
  position: absolute;
  top: 16px; right: 20px;
  font-size: 56px;
  font-weight: 900;
  font-family: 'Inter', sans-serif;
  opacity: 0.06;
  line-height: 1;
}
.digest-entry .date-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 12px;
  background: rgba(59,109,224,0.08);
  color: var(--accent-blue);
}
.digest-entry h3 {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}
.digest-entry .meta {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.7;
}
.digest-entry .topics {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}
.topic-pill {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
}

/* Gradient variants for cards */
.g1 { background: linear-gradient(135deg, #3b6de0, #7c5cdb); }
.g2 { background: linear-gradient(135deg, #e8842a, #e04848); }
.g3 { background: linear-gradient(135deg, #1aab55, #0ea5a5); }
.g4 { background: linear-gradient(135deg, #7c5cdb, #e04848); }

/* Footer */
.footer {
  margin-top: 64px;
  padding: 40px;
  text-align: center;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13px;
}
.footer .disclaimer {
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.8;
}

/* Responsive */
@media (max-width: 768px) {
  .hero { padding: 40px 20px 36px; }
  .hero h1 { font-size: 28px; }
  .container { padding: 0 20px; }
  .digest-list { grid-template-columns: 1fr; }
  .stats-strip { gap: 12px; }
  .stat-item { padding: 10px 14px; }
}
</style>

// ── Render Logic ──
function render() {
  document.getElementById('total-count').textContent = digests.length;
  if (digests.length > 0) {
    document.getElementById('latest-date').textContent = digests[0].date.replace(/-/g, '/');
  }

  // Group by month
  const months = {};
  digests.forEach(d => {
    const key = d.date.substring(0, 7); // "2026-02"
    if (!months[key]) months[key] = [];
    months[key].push(d);
  });

  const container = document.getElementById('digest-container');
  const gradients = ['g1','g2','g3','g4'];

  Object.keys(months).sort().reverse().forEach(monthKey => {
    const [year, month] = monthKey.split('-');
    const monthNames = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    const group = document.createElement('div');
    group.className = 'month-group';
    group.innerHTML = `
      <div class="month-header">
        <div class="month-icon">${parseInt(month)}</div>
        <div>
          <h2>${year}年 ${monthNames[parseInt(month)]}</h2>
          <span class="sub">${months[monthKey].length} digests</span>
        </div>
      </div>
    `;

    const list = document.createElement('div');
    list.className = 'digest-list';

    months[monthKey].forEach((d, i) => {
      const day = parseInt(d.date.split('-')[2]);
      const g = d.gradient || gradients[i % gradients.length];
      const highlightHTML = d.highlights.map(h =>
        `<span class="topic-pill">${h.length > 30 ? h.substring(0,30)+'…' : h}</span>`
      ).join('');

      const entry = document.createElement('a');
      entry.className = 'digest-entry';
      entry.href = d.file;
      entry.innerHTML = `
        <div class="accent ${g}"></div>
        <span class="day-number">${String(day).padStart(2,'0')}</span>
        <div class="date-tag">📅 ${d.date}（${d.weekday}）</div>
        <h3>Daily News Digest</h3>
        <p class="meta">${d.cards} cards ・ 5 sections ・ 24h以内のソース</p>
        <div class="topics">${highlightHTML}</div>
      `;
      list.appendChild(entry);
    });

    group.appendChild(list);
    container.appendChild(group);
  });
}

document.addEventListener('DOMContentLoaded', render);
